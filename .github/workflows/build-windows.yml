name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify model file
        run: |
          $size = (Get-Item "xRobotstuffx/model.onnx").Length
          Write-Host "Model file size: $size bytes"
          if ($size -lt 1000000) {
            Write-Host "ERROR: Model file appears to be an LFS pointer, not the actual file"
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller bodysegai.spec

      - name: Create distribution zip
        run: |
          Compress-Archive -Path "dist/BodySegAI/*" -DestinationPath "BodySegAI-Windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BodySegAI-Windows
          path: BodySegAI-Windows.zip
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BodySegAI-Windows.zip
          generate_release_notes: true
